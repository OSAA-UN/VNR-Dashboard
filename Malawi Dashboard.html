document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px;\">\n    <div style=\"max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:4px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#7A8A9A;text-transform:uppercase;\">Southern Africa Operations / <span style=\"color:#1F6FB2;font-weight:500;\">Malawi<\u002Fspan> · Country Dashboard · Prototype V4<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\">\n        <h1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.01em;\">Malawi<\u002Fh1>\n        <span style=\"font-size:13.5px;color:#5A6B7C;\">Data sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">Voluntary National Reviews (VNR) 2020, 2022 &amp; 2026<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">United Nations Sustainable Development Goals (SDG) Database<\u002Fa><\u002Fspan>\n      <\u002Fdiv>\n      <nav style=\"display:flex;gap:4px;margin-top:14px;flex-wrap:wrap;\">\n        <button data-tab-btn=\"overview\" style=\"{{ tabBtn.overview }}\" onclick=\"{{ onTab.overview }}\">Overview &amp; Trends<\u002Fbutton>\n        <button data-tab-btn=\"goals\" style=\"{{ tabBtn.goals }}\" onclick=\"{{ onTab.goals }}\">2026 Focus Goals<\u002Fbutton>\n        <button data-tab-btn=\"joint\" style=\"{{ tabBtn.joint }}\" onclick=\"{{ onTab.joint }}\">Malawi 2063 &amp; SDGs<\u002Fbutton>\n        <button data-tab-btn=\"policy\" style=\"{{ tabBtn.policy }}\" onclick=\"{{ onTab.policy }}\">Policy Responses<\u002Fbutton>\n        <button data-tab-btn=\"financing\" style=\"{{ tabBtn.financing }}\" onclick=\"{{ onTab.financing }}\">Financing<\u002Fbutton>\n        <button data-tab-btn=\"debt\" style=\"{{ tabBtn.debt }}\" onclick=\"{{ onTab.debt }}\">Debt &amp; Revenue<\u002Fbutton>\n        <button data-tab-btn=\"water\" style=\"{{ tabBtn.water }}\" onclick=\"{{ onTab.water }}\">Year of Water Sustainability<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <main style=\"flex:1;padding:32px 48px 56px 48px;\"><div style=\"max-width:1280px;margin:0 auto;\"><div data-tab-panel=\"overview\" style=\"{{ tabPanel.overview }}\">\n<div data-screen-label=\"Overview\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px;\">\n<button data-tile-btn=\"elec\" style=\"{{ metricBtn.elec }}\" onclick=\"{{ onMetric.elec }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#7A8A9A;\">Electricity Access<\u002Fspan><span style=\"font-size:28px;font-weight:700;color:#2E7D5B;\">25.9%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#2E7D5B;\">▲ +15.2 pts since 2015<\u002Fspan><\u002Fbutton>\n<button data-tile-btn=\"water\" style=\"{{ metricBtn.water }}\" onclick=\"{{ onMetric.water }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#7A8A9A;\">Improved Water<\u002Fspan><span style=\"font-size:28px;font-weight:700;color:#2E7D5B;\">89%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#B0791F;\">basic sanitation only 40%<\u002Fspan><\u002Fbutton>\n<button data-tile-btn=\"rev\" style=\"{{ metricBtn.rev }}\" onclick=\"{{ onMetric.rev }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#7A8A9A;\">Revenue / GDP<\u002Fspan><span style=\"font-size:28px;font-weight:700;color:#B0791F;\">15.9%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#B0791F;\">▼ from 16.5% in 2021/22<\u002Fspan><\u002Fbutton>\n<button data-tile-btn=\"debt\" style=\"{{ metricBtn.debt }}\" onclick=\"{{ onMetric.debt }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#7A8A9A;\">Public Debt / GDP<\u002Fspan><span style=\"font-size:28px;font-weight:700;color:#B4533A;\">91.3%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#B4533A;\">unsustainable level<\u002Fspan><\u002Fbutton>\n<button data-tile-btn=\"taxes\" style=\"{{ metricBtn.taxes }}\" onclick=\"{{ onMetric.taxes }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#7A8A9A;\">Budget on Own Taxes<\u002Fspan><span style=\"font-size:28px;font-weight:700;color:#1F6FB2;\">54%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#1F6FB2;\">▲ from 19.8% in 2015<\u002Fspan><\u002Fbutton>\n<\u002Fdiv><div data-metric-panel=\"elec\" style=\"{{ metricPanel.elec }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;animation:rise 0.3s ease both;\"><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;\"><div style=\"font-size:17px;font-weight:600;\">National electricity access, 2015–2025<\u002Fdiv><div style=\"font-size:12.5px;color:#5A6B7C;\">Hover over points for values and sources<\u002Fdiv><\u002Fdiv>\n<svg viewBox=\"0 0 760 250\" style=\"width:100%;height:auto;display:block;margin-top:10px;\">\n<line x1=\"60\" y1=\"200\" x2=\"700\" y2=\"200\" stroke=\"#E3E7EC\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"204\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">0%<\u002Ftext><line x1=\"60\" y1=\"155\" x2=\"700\" y2=\"155\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"159\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">10%<\u002Ftext><line x1=\"60\" y1=\"110\" x2=\"700\" y2=\"110\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"114\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">20%<\u002Ftext><line x1=\"60\" y1=\"65\" x2=\"700\" y2=\"65\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"69\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">30%<\u002Ftext><line x1=\"60\" y1=\"20\" x2=\"700\" y2=\"20\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"24\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\"><\u002Ftext>\n<defs><linearGradient id=\"gE\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#2E7D5B\" stop-opacity=\"0.18\"><\u002Fstop><stop offset=\"1\" stop-color=\"#2E7D5B\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n<polygon points=\"188,135.8 358,110 528,80 700,44.6 700,200 188,200\" fill=\"url(#gE)\"><\u002Fpolygon>\n<polyline points=\"188,135.8 358,110 528,80 700,44.6\" fill=\"none\" stroke=\"#2E7D5B\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n<circle cx=\"188\" cy=\"135.8\" r=\"4.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.1s both;\"><title>2015, 10.7%<\u002Ftitle><\u002Fcircle>\n<circle cx=\"358\" cy=\"110\" r=\"4.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.25s both;\"><title>2018, ~15% (trajectory)<\u002Ftitle><\u002Fcircle>\n<circle cx=\"528\" cy=\"80\" r=\"4.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.35s both;\"><title>2021, ~20% (trajectory)<\u002Ftitle><\u002Fcircle>\n<circle cx=\"700\" cy=\"44.6\" r=\"5.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.5s both;\"><title>2024/25, 25.9%<\u002Ftitle><\u002Fcircle>\n<text x=\"712\" y=\"48\" font-family=\"IBM Plex Mono\" font-size=\"12\" font-weight=\"600\" fill=\"#2E7D5B\">25.9%<\u002Ftext>\n<text x=\"188\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2015<\u002Ftext><text x=\"358\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2018<\u002Ftext><text x=\"528\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2021<\u002Ftext><text x=\"700\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2024/25<\u002Ftext>\n<\u002Fsvg>\n<p style=\"margin:12px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">Electricity access more than doubled, from 10.7% of the population in 2015 to 25.9% in 2024/25, driven by the Malawi Rural Electrification Programme (MAREP), grid extension and off-grid solar. The national figure masks a stark divide: 56.4% of urban residents have access against just 5.3% of rural residents, making rural electrification the defining challenge.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:10px;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.63–65<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 7.1.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div data-metric-panel=\"water\" style=\"{{ metricPanel.water }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;animation:rise 0.3s ease both;\"><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;\"><div style=\"font-size:17px;font-weight:600;\">Access to improved drinking water, 2015–2024<\u002Fdiv><div style=\"font-size:12.5px;color:#5A6B7C;\">Hover over points for values and sources<\u002Fdiv><\u002Fdiv>\n<svg viewBox=\"0 0 760 250\" style=\"width:100%;height:auto;display:block;margin-top:10px;\">\n<line x1=\"60\" y1=\"200\" x2=\"700\" y2=\"200\" stroke=\"#E3E7EC\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"204\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">60%<\u002Ftext><line x1=\"60\" y1=\"155\" x2=\"700\" y2=\"155\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"159\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">70%<\u002Ftext><line x1=\"60\" y1=\"110\" x2=\"700\" y2=\"110\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"114\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">80%<\u002Ftext><line x1=\"60\" y1=\"65\" x2=\"700\" y2=\"65\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"69\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">90%<\u002Ftext><line x1=\"60\" y1=\"20\" x2=\"700\" y2=\"20\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"24\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">100%<\u002Ftext>\n<polyline points=\"188,78.5 700,69.5\" fill=\"none\" stroke=\"#2E7D5B\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n<line x1=\"188\" y1=\"141.5\" x2=\"700\" y2=\"141.5\" stroke=\"#B0791F\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline>\n<circle cx=\"188\" cy=\"78.5\" r=\"4.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.1s both;\"><title>Improved water 2015, 87%<\u002Ftitle><\u002Fcircle>\n<circle cx=\"700\" cy=\"69.5\" r=\"5.5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.4s both;\"><title>Improved water 2024, 89%<\u002Ftitle><\u002Fcircle>\n<circle cx=\"700\" cy=\"141.5\" r=\"4.5\" fill=\"#B0791F\" style=\"animation:pop 0.4s ease 0.3s both;\"><title>At least basic water services 2024, 73%<\u002Ftitle><\u002Fcircle>\n<text x=\"712\" y=\"73\" font-family=\"IBM Plex Mono\" font-size=\"12\" font-weight=\"600\" fill=\"#2E7D5B\">89%<\u002Ftext>\n<text x=\"712\" y=\"145\" font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"#B0791F\">73%<\u002Ftext>\n<text x=\"188\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2015<\u002Ftext><text x=\"700\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2024<\u002Ftext>\n<\u002Fsvg>\n<div style=\"display:flex;gap:18px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#5A6B7C;\"><span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:16px;height:3px;background:#2E7D5B;border-radius:2px;\"><\u002Fspan>Improved source<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:16px;height:3px;background:#B0791F;border-radius:2px;\"><\u002Fspan>At least basic service<\u002Fspan><\u002Fdiv>\n<p style=\"margin:12px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">Access to an improved drinking-water source is already high and edged up from 87% to 89% between 2015 and 2024. The tighter measure — at least basic water services — sits lower at 73%, and sanitation lags furthest behind: only 40% of the population has access to at least basic sanitation. Water access is a relative strength; sanitation is the clearer priority.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:10px;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.57–59<\u002Fa> · <a href=\"https://washdata.org\" target=\"_blank\" rel=\"noopener\">WHO/UNICEF JMP / MDHS 2024<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 6.1.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div data-metric-panel=\"rev\" style=\"{{ metricPanel.rev }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;animation:rise 0.3s ease both;\"><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;\"><div style=\"font-size:17px;font-weight:600;\">Total government revenue as a share of GDP<\u002Fdiv><div style=\"font-size:12.5px;color:#5A6B7C;\">Hover over points for values and sources<\u002Fdiv><\u002Fdiv>\n<svg viewBox=\"0 0 760 250\" style=\"width:100%;height:auto;display:block;margin-top:10px;\">\n<line x1=\"60\" y1=\"200\" x2=\"700\" y2=\"200\" stroke=\"#E3E7EC\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"204\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">0%<\u002Ftext><line x1=\"60\" y1=\"155\" x2=\"700\" y2=\"155\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"159\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">5%<\u002Ftext><line x1=\"60\" y1=\"110\" x2=\"700\" y2=\"110\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"114\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">10%<\u002Ftext><line x1=\"60\" y1=\"65\" x2=\"700\" y2=\"65\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"69\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">15%<\u002Ftext><line x1=\"60\" y1=\"20\" x2=\"700\" y2=\"20\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"24\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">20%<\u002Ftext>\n<line x1=\"60\" y1=\"76.7\" x2=\"700\" y2=\"76.7\" stroke=\"#B4533A\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"><\u002Fline>\n<text x=\"66\" y=\"90\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#B4533A\">tax revenue 13.7% of GDP (2022/23)<\u002Ftext>\n<polyline points=\"188,51.5 700,56.9\" fill=\"none\" stroke=\"#2E7D5B\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n<circle cx=\"188\" cy=\"51.5\" r=\"5\" fill=\"#2E7D5B\" style=\"animation:pop 0.4s ease 0.15s both;\"><title>2021/22, 16.5% of GDP<\u002Ftitle><\u002Fcircle>\n<circle cx=\"700\" cy=\"56.9\" r=\"5.5\" fill=\"#B0791F\" style=\"animation:pop 0.4s ease 0.4s both;\"><title>2023/24, 15.9% of GDP<\u002Ftitle><\u002Fcircle>\n<text x=\"712\" y=\"55\" font-family=\"IBM Plex Mono\" font-size=\"12\" font-weight=\"600\" fill=\"#B0791F\">15.9%<\u002Ftext>\n<text x=\"188\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2021/22<\u002Ftext><text x=\"700\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2023/24<\u002Ftext>\n<\u002Fsvg>\n<p style=\"margin:12px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">Total government revenue slipped from 16.5% of GDP in 2021/22 to 15.9% in 2023/24, with tax revenue at 13.7% of GDP — constrained by forex shortages, inflation and repeated climate shocks. Even so, the share of the domestic budget financed by Malawi's own taxes has climbed dramatically, from 19.8% in 2015 to 54% in 2024, reflecting reforms such as the Msonkho Online digital tax platform.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:10px;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.113 (Figures 22–23)<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 17.1.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div data-metric-panel=\"debt\" style=\"{{ metricPanel.debt }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;animation:rise 0.3s ease both;\"><div style=\"font-size:17px;font-weight:600;\">Public debt has reached unsustainable levels<\u002Fdiv>\n<div style=\"margin-top:18px;\">\n  <div style=\"position:relative;height:26px;background:#EEF1F4;border-radius:999px;overflow:hidden;\"><div style=\"width:91.3%;height:100%;background:#B4533A;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) both;\" title=\"Total public debt 91.3% of GDP\"><\u002Fdiv><\u002Fdiv>\n  <div style=\"position:relative;height:18px;margin-top:2px;\"><div style=\"position:absolute;left:60%;top:0;border-left:2px dashed #1B2A3A;height:8px;\"><\u002Fdiv><div style=\"position:absolute;left:60%;top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5A6B7C;transform:translateX(-50%);\">60% sustainability benchmark<\u002Fdiv><div style=\"position:absolute;left:91.3%;top:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#B4533A;transform:translateX(-100%);\">91.3%<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:26px;\">\n<div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Well above the 60% benchmark\"><div style=\"font-size:24px;font-weight:700;color:#B4533A;\">91.3%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">total public debt, % of GDP<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Benchmark is 10%\"><div style=\"font-size:24px;font-weight:700;color:#B4533A;\">60%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">external debt service, % of exports (2023)<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Largest single expenditure item\"><div style=\"font-size:24px;font-weight:700;color:#B0791F;\">32%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">of domestic revenue spent on debt service<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Provides limited budget support\"><div style=\"font-size:24px;font-weight:700;color:#1F6FB2;\">IMF<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">Extended Credit Facility anchoring reform<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<p style=\"margin:16px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">Total public debt has reached 91.3% of GDP — an unsustainable level driven by persistent fiscal deficits, currency depreciation and recurrent shocks including Cyclone Freddy. Debt service is now the single largest expenditure item, consuming 32% of domestic revenue (about 6.7% of GDP), while external debt service reached 60% of exports in 2023, far above the 10% sustainability threshold.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:10px;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.21, 114, 126<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 17.4.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div data-metric-panel=\"taxes\" style=\"{{ metricPanel.taxes }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;animation:rise 0.3s ease both;\"><div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;\"><div style=\"font-size:17px;font-weight:600;\">Share of the domestic budget funded by own taxes<\u002Fdiv><div style=\"font-size:12.5px;color:#5A6B7C;\">Hover over points for values and sources<\u002Fdiv><\u002Fdiv>\n<svg viewBox=\"0 0 760 250\" style=\"width:100%;height:auto;display:block;margin-top:10px;\">\n<line x1=\"60\" y1=\"200\" x2=\"700\" y2=\"200\" stroke=\"#E3E7EC\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"204\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">0%<\u002Ftext><line x1=\"60\" y1=\"155\" x2=\"700\" y2=\"155\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"159\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\"><\u002Ftext><line x1=\"60\" y1=\"110\" x2=\"700\" y2=\"110\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"114\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">40%<\u002Ftext><line x1=\"60\" y1=\"65\" x2=\"700\" y2=\"65\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"69\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\"><\u002Ftext><line x1=\"60\" y1=\"20\" x2=\"700\" y2=\"20\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><text x=\"50\" y=\"24\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"10\" fill=\"#9AA7B4\">60%<\u002Ftext>\n<polygon points=\"188,140.6 444,95 700,38 700,200 188,200\" fill=\"url(#gT)\"><\u002Fpolygon>\n<defs><linearGradient id=\"gT\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#1F6FB2\" stop-opacity=\"0.16\"><\u002Fstop><stop offset=\"1\" stop-color=\"#1F6FB2\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n<polyline points=\"188,140.6 444,95 700,38\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n<circle cx=\"188\" cy=\"140.6\" r=\"4.5\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.1s both;\"><title>2015, 19.8%<\u002Ftitle><\u002Fcircle>\n<circle cx=\"444\" cy=\"95\" r=\"4.5\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.3s both;\"><title>~2020, ~35% (trajectory)<\u002Ftitle><\u002Fcircle>\n<circle cx=\"700\" cy=\"38\" r=\"5.5\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.5s both;\"><title>2024, 54%<\u002Ftitle><\u002Fcircle>\n<text x=\"712\" y=\"42\" font-family=\"IBM Plex Mono\" font-size=\"12\" font-weight=\"600\" fill=\"#1F6FB2\">54%<\u002Ftext>\n<text x=\"188\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2015<\u002Ftext><text x=\"444\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2020<\u002Ftext><text x=\"700\" y=\"222\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#7A8A9A\">2024<\u002Ftext>\n<\u002Fsvg>\n<p style=\"margin:12px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">The clearest bright spot in Malawi's public finances: the share of the domestic budget funded by the country's own taxes has nearly tripled, from 19.8% in 2015 to 54% in 2024. Digitized tax administration through the Msonkho Online platform, a review of tax incentives and stronger local-government revenue collection are steadily reducing reliance on external financing.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:10px;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.113, 123–124<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 17.1.2<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div data-tab-panel=\"goals\" style=\"{{ tabPanel.goals }}\">\n<div data-screen-label=\"Focus Goals\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><h2 style=\"margin:0;font-size:22px;font-weight:700;\">2026 Focus Goals: Achievements &amp; Priorities<\u002Fh2><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5A6B7C;\">The Sustainable Development Goals reviewed in depth at the 2026 United Nations High-Level Political Forum. Figures combine Malawi's Voluntary National Review 2026 with the United Nations SDG Database — select a goal to explore.<\u002Fp><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px;\">\n<button data-goal-btn=\"s6\" style=\"{{ goalBtn.s6 }}\" onclick=\"{{ onGoal.s6 }}\"><span style=\"width:30px;height:30px;border-radius:7px;background:#26BDE2;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;\">6<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;line-height:1.3;\">Clean Water and Sanitation<\u002Fspan><\u002Fbutton>\n<button data-goal-btn=\"s7\" style=\"{{ goalBtn.s7 }}\" onclick=\"{{ onGoal.s7 }}\"><span style=\"width:30px;height:30px;border-radius:7px;background:#FCC30B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;\">7<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;line-height:1.3;\">Affordable and Clean Energy<\u002Fspan><\u002Fbutton>\n<button data-goal-btn=\"s9\" style=\"{{ goalBtn.s9 }}\" onclick=\"{{ onGoal.s9 }}\"><span style=\"width:30px;height:30px;border-radius:7px;background:#FD6925;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;\">9<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;line-height:1.3;\">Industry, Innovation and Infrastructure<\u002Fspan><\u002Fbutton>\n<button data-goal-btn=\"s11\" style=\"{{ goalBtn.s11 }}\" onclick=\"{{ onGoal.s11 }}\"><span style=\"width:30px;height:30px;border-radius:7px;background:#FD9D24;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;\">11<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;line-height:1.3;\">Sustainable Cities and Communities<\u002Fspan><\u002Fbutton>\n<button data-goal-btn=\"s17\" style=\"{{ goalBtn.s17 }}\" onclick=\"{{ onGoal.s17 }}\"><span style=\"width:30px;height:30px;border-radius:7px;background:#19486A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;\">17<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;line-height:1.3;\">Partnerships for the Goals<\u002Fspan><\u002Fbutton>\n<\u002Fdiv>\n<div data-goal-panel=\"s6\" style=\"{{ goalPanel.s6 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;animation:rise 0.3s ease both;\"><div style=\"display:flex;flex-direction:column;gap:14px;\"><div style=\"font-size:18px;font-weight:700;\">SDG 6 · Clean Water and Sanitation<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:12px;\"><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Improved water<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:89%;height:100%;background:#2E7D5B;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2E7D5B;font-weight:600;\">89%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Basic water<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:73%;height:100%;background:#1F6FB2;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#1F6FB2;font-weight:600;\">73%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Basic sanitation<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:40%;height:100%;background:#B0791F;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.2s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B0791F;font-weight:600;\">40%<\u002Fspan><\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.57–59<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicators 6.1.1 &amp; 6.2.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\"><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#E5F1EB;color:#2E7D5B;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Achievement<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Improved water access reached 89%; clean-water supply projects cut waterborne disease, with community reports of sharply lower cholera and diarrhoea cases.<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#EAF1F8;color:#1F6FB2;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Priority Ahead<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Closing the sanitation gap — only 40% have at least basic sanitation — and ending open defecation, which persists in parts of the country.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-goal-panel=\"s7\" style=\"{{ goalPanel.s7 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;animation:rise 0.3s ease both;\"><div style=\"display:flex;flex-direction:column;gap:14px;\"><div style=\"font-size:18px;font-weight:700;\">SDG 7 · Affordable and Clean Energy<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:12px;\"><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Urban access<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:56.4%;height:100%;background:#2E7D5B;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2E7D5B;font-weight:600;\">56.4%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">National access<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:25.9%;height:100%;background:#1F6FB2;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#1F6FB2;font-weight:600;\">25.9%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Rural access<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:5.3%;height:100%;background:#B4533A;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.2s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B4533A;font-weight:600;\">5.3%<\u002Fspan><\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.63–65<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 7.1.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\"><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#E5F1EB;color:#2E7D5B;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Achievement<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Access rose from 10.7% to 25.9% via MAREP rural electrification, off-grid solar and new generation such as the Mpatamanga hydropower project.<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#EAF1F8;color:#1F6FB2;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Priority Ahead<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Bridging the extreme rural-urban gap (5.3% rural vs 56.4% urban) and scaling clean cooking, which remains very low.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-goal-panel=\"s9\" style=\"{{ goalPanel.s9 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;animation:rise 0.3s ease both;\"><div style=\"display:flex;flex-direction:column;gap:14px;\"><div style=\"font-size:18px;font-weight:700;\">SDG 9 · Industry, Innovation and Infrastructure<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:12px;\"><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Financial inclusion<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:33.3%;height:100%;background:#2E7D5B;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2E7D5B;font-weight:600;\">33.3%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Internet use<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:18%;height:100%;background:#1F6FB2;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#1F6FB2;font-weight:600;\">18%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Manufacturing / GDP<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:11.6%;height:100%;background:#B0791F;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.2s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B0791F;font-weight:600;\">11.6%<\u002Fspan><\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.77–82<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicators 9.2.1 &amp; 9.c.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\"><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#E5F1EB;color:#2E7D5B;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Achievement<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Over 500 km of corridor roads (M1, M5) rehabilitated with World Bank and AfDB support; account ownership jumped from 0.22% to 33.3% and mobile payments grew 482%.<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#EAF1F8;color:#1F6FB2;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Priority Ahead<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Lifting manufacturing value added beyond 11.6% of GDP and extending reliable 4G and all-season roads into rural areas.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-goal-panel=\"s11\" style=\"{{ goalPanel.s11 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;animation:rise 0.3s ease both;\"><div style=\"display:flex;flex-direction:column;gap:14px;\"><div style=\"font-size:18px;font-weight:700;\">SDG 11 · Sustainable Cities and Communities<\u002Fdiv><div style=\"display:flex;align-items:center;gap:24px;\"><svg viewBox=\"0 0 120 120\" style=\"width:120px;height:120px;\"><circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"#EEF1F4\" stroke-width=\"16\"><\u002Fcircle><circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"16\" stroke-dasharray=\"90.5 210.9\" stroke-linecap=\"round\" transform=\"rotate(-90 60 60)\"><title>Urban population projected to reach 30% by 2030<\u002Ftitle><\u002Fcircle><text x=\"60\" y=\"66\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"21\" font-weight=\"600\" fill=\"#1F6FB2\">30%<\u002Ftext><\u002Fsvg><div style=\"font-size:13.5px;line-height:1.55;color:#5A6B7C;\">of Malawians are projected to live in urban areas by 2030, up from a largely rural base<\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.90–92<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 11.1.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\"><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#E5F1EB;color:#2E7D5B;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Achievement<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Urban planning, housing regularization and disaster preparedness are advancing through government and community partnerships as towns grow.<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#EAF1F8;color:#1F6FB2;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Priority Ahead<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Building resilient, well-serviced cities — most community roads are earth-standard and impassable in the rains, and Cyclone Freddy exposed deep vulnerability.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-goal-panel=\"s17\" style=\"{{ goalPanel.s17 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;animation:rise 0.3s ease both;\"><div style=\"display:flex;flex-direction:column;gap:14px;\"><div style=\"font-size:18px;font-weight:700;\">SDG 17 · Partnerships for the Goals<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:12px;\"><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Budget on own taxes<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:54%;height:100%;background:#2E7D5B;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2E7D5B;font-weight:600;\">54%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Revenue / GDP<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:53%;height:100%;background:#1F6FB2;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#1F6FB2;font-weight:600;\">15.9%<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">MIP-1 SDG alignment<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:82%;height:100%;background:#A5C9E3;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.2s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#A5C9E3;font-weight:600;\">81.6%<\u002Fspan><\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.112–115<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicators 17.1.1 &amp; 17.4.1<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\"><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#E5F1EB;color:#2E7D5B;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Achievement<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">The domestic budget funded by own taxes rose from 19.8% to 54%, and MIP-1 is 81.6% aligned with the SDGs, giving one coherent delivery framework.<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:#EAF1F8;color:#1F6FB2;padding:4px 10px;border-radius:999px;align-self:flex-start;\">Priority Ahead<\u002Fspan><span style=\"font-size:14px;line-height:1.55;\">Managing public debt at 91.3% of GDP and debt service that consumes 32% of domestic revenue while protecting development spending.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div data-tab-panel=\"joint\" style=\"{{ tabPanel.joint }}\">\n<div data-screen-label=\"Malawi 2063\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><h2 style=\"margin:0;font-size:22px;font-weight:700;\">Malawi 2063 &amp; SDG Integration<\u002Fh2><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5A6B7C;\">Malawi does not run a separate tracking tool for the Sustainable Development Goals. Instead the 2030 Agenda is built directly into the national vision, Malawi 2063 (MW2063), and its First 10-Year Implementation Plan (MIP-1) — the primary vehicle for delivering the SDGs. Since the 2023/24 budget, government spending is aligned to MIP-1 pillars, and a single results framework tracks 130 indicators across both agendas.<\u002Fp><\u002Fdiv>\n<div style=\"display:flex;flex-direction:column;gap:16px;\">\n<div style=\"background:linear-gradient(135deg,#1F6FB2 0%,#16537E 100%);border-radius:18px;padding:34px 38px;color:#FFFFFF;display:flex;flex-direction:column;gap:22px;box-shadow:0 14px 34px rgba(22,83,126,0.24);\">\n  <div style=\"display:flex;flex-direction:column;gap:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);\">National vision · MIP-1 (2021–2030)<\u002Fspan><div style=\"font-size:21px;font-weight:700;letter-spacing:-0.01em;\">How closely MIP-1 aligns with the SDGs<\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.86);max-width:900px;\">The First 10-Year Implementation Plan is 81.6% aligned with the SDGs overall — very strong at the goal level, but thinner at the indicator level, which is where Malawi is focusing measurement reforms.<\u002Fp><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;\"><span style=\"font-size:13px;color:rgba(255,255,255,0.9);\">Goal level<\u002Fspan><div style=\"height:18px;background:rgba(255,255,255,0.18);border-radius:999px;\"><div style=\"width:98.53%;height:100%;background:#FFFFFF;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) 0.05s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:#fff;\">98.5%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;\"><span style=\"font-size:13px;color:rgba(255,255,255,0.9);\">Overall SDG<\u002Fspan><div style=\"height:18px;background:rgba(255,255,255,0.18);border-radius:999px;\"><div style=\"width:81.62%;height:100%;background:#FFFFFF;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) 0.12s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:#fff;\">81.6%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;\"><span style=\"font-size:13px;color:rgba(255,255,255,0.9);\">Agenda 2063<\u002Fspan><div style=\"height:18px;background:rgba(255,255,255,0.18);border-radius:999px;\"><div style=\"width:73.6%;height:100%;background:#F4CE8A;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) 0.19s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:#fff;\">73.6%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;\"><span style=\"font-size:13px;color:rgba(255,255,255,0.9);\">Target level<\u002Fspan><div style=\"height:18px;background:rgba(255,255,255,0.18);border-radius:999px;\"><div style=\"width:72.19%;height:100%;background:#F4CE8A;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) 0.26s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:#fff;\">72.2%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;\"><span style=\"font-size:13px;color:rgba(255,255,255,0.9);\">Indicator level<\u002Fspan><div style=\"height:18px;background:rgba(255,255,255,0.18);border-radius:999px;\"><div style=\"width:53.48%;height:100%;background:#F4CE8A;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) 0.33s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:#fff;\">53.5%<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.55);\">Source: VNR 2026, p.19–20 · MIP-1 alignment assessment<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n  <div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;gap:12px;\">\n    <div style=\"font-size:16px;font-weight:600;\">Digital connectivity &amp; financial inclusion<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n      <div style=\"background:#F1F6FA;border-radius:10px;padding:12px 14px;\" title=\"Bank or mobile-money account, up from 0.22% in 2015\"><div style=\"font-size:22px;font-weight:700;color:#1F6FB2;\">33.3%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">Adults with an account<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F1F6FA;border-radius:10px;padding:12px 14px;\" title=\"Up from 43.2% in 2020\"><div style=\"font-size:22px;font-weight:700;color:#1F6FB2;\">57%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">Mobile phone ownership<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F1F6FA;border-radius:10px;padding:12px 14px;\" title=\"Up from 5.6% in 2015\"><div style=\"font-size:22px;font-weight:700;color:#1F6FB2;\">18%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">Internet usage<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F1F6FA;border-radius:10px;padding:12px 14px;\" title=\"2020–2023, to MK13.0 trillion\"><div style=\"font-size:22px;font-weight:700;color:#1F6FB2;\">+482%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">Mobile payment value<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0;font-size:12.5px;line-height:1.55;color:#5A6B7C;\">Mobile money is transforming financial access, especially in rural areas where traditional banking is thin. Fixed broadband and internet usage are climbing steadily, opening the way to e-extension, fintech and digital public services.<\u002Fp>\n    <div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.77, 114–115<\u002Fa> · MACRA 2024<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;gap:10px;\">\n    <div style=\"font-size:16px;font-weight:600;\">One plan, three agendas<\u002Fdiv>\n    <p style=\"margin:0;font-size:13px;line-height:1.6;color:#5A6B7C;\">MIP-1 serves Malawi 2063, the SDGs and the African Union's Agenda 2063 together, with 73.6% alignment to Agenda 2063. Delivery is coordinated through Pillar and Enabler Coordination Groups (PECGs), a High-Level Forum and a Technical Secretariat, and the government budget has been aligned to MIP-1 pillars since 2023/24.<\u002Fp>\n    <div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.28–31, 112–113, 127<\u002Fa><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv><\u002Fdiv><div data-tab-panel=\"policy\" style=\"{{ tabPanel.policy }}\">\n<div data-screen-label=\"Policy Responses\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><h2 style=\"margin:0;font-size:22px;font-weight:700;\">Policy Responses in Motion<\u002Fh2><p style=\"margin:0;font-size:14px;color:#5A6B7C;\">Six named national instruments — select one to explore.<\u002Fp><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\">\n<button data-inst-btn=\"mw2063\" style=\"{{ instBtn.mw2063 }}\" onclick=\"{{ onInst.mw2063 }}\"><span style=\"font-weight:600;\">Malawi 2063 &amp; MIP-1<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">national vision<\u002Fspan><\u002Fbutton>\n<button data-inst-btn=\"finstrat\" style=\"{{ instBtn.finstrat }}\" onclick=\"{{ onInst.finstrat }}\"><span style=\"font-weight:600;\">National Financing Strategy<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">for MW2063<\u002Fspan><\u002Fbutton>\n<button data-inst-btn=\"drm\" style=\"{{ instBtn.drm }}\" onclick=\"{{ onInst.drm }}\"><span style=\"font-weight:600;\">Domestic Resource Mobilization<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">Msonkho Online<\u002Fspan><\u002Fbutton>\n<button data-inst-btn=\"marep\" style=\"{{ instBtn.marep }}\" onclick=\"{{ onInst.marep }}\"><span style=\"font-weight:600;\">Rural Electrification (MAREP)<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">+ Mpatamanga hydro<\u002Fspan><\u002Fbutton>\n<button data-inst-btn=\"imf\" style=\"{{ instBtn.imf }}\" onclick=\"{{ onInst.imf }}\"><span style=\"font-weight:600;\">IMF Extended Credit Facility<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">debt 91.3% of GDP<\u002Fspan><\u002Fbutton>\n<button data-inst-btn=\"climate\" style=\"{{ instBtn.climate }}\" onclick=\"{{ onInst.climate }}\"><span style=\"font-weight:600;\">Climate Adaptation &amp; DRM<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7A8A9A;\">post-Cyclone Freddy<\u002Fspan><\u002Fbutton>\n<\u002Fdiv>\n<div>\n<div data-inst-panel=\"mw2063\" style=\"{{ instPanel.mw2063 }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">Malawi 2063 &amp; MIP-1<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">The long-term vision and its first 10-year plan<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">2063<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">vision horizon for an inclusive, self-reliant nation<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">81.6%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">MIP-1 alignment with the SDGs<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">2030<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">MIP-1 target for lower-middle-income status<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">Malawi 2063 sets the destination — inclusive wealth creation and self-reliance — and the First 10-Year Implementation Plan (MIP-1) is the vehicle to deliver the majority of the SDGs by 2030. Government budgets have been aligned to MIP-1 pillars since 2023/24, coordinated through Pillar and Enabler Coordination Groups.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.19–20, 28–31<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-inst-panel=\"finstrat\" style=\"{{ instPanel.finstrat }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">National Financing Strategy<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">Systematically funding the MW2063 vision<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">$744M<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">five-year US grant secured for health services<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">Multi<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">public, private, domestic and external sources<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">MIP-1<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">pillars anchor budget allocations<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">In response to fiscal pressure, forex shortages and high debt, the Government adopted a comprehensive national financing strategy to marshal domestic and external, public and private resources behind Malawi 2063 — including concessional funds, FDI attraction and stronger public financial management.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.123–127<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-inst-panel=\"drm\" style=\"{{ instPanel.drm }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">Domestic Resource Mobilization (Msonkho Online)<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">Broadening the tax base and digitizing collection<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">54%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">of the budget funded by own taxes, up from 19.8%<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#B0791F;\">13.7%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">tax revenue as a share of GDP (2022/23)<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">Digital<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">tax administration via Msonkho Online<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">The Government digitized tax administration through the Msonkho Online platform, reviewed tax incentives to broaden the base, strengthened local-government revenue and reformed state-owned enterprises — nearly tripling the share of the budget financed by domestic taxes since 2015.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.123–124<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-inst-panel=\"marep\" style=\"{{ instPanel.marep }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">Malawi Rural Electrification Programme<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">Grid extension, off-grid solar and new generation<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">25.9%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">national electricity access, up from 10.7% in 2015<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#B4533A;\">5.3%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">rural access, against 56.4% in urban areas<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">Mpatamanga<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">new hydropower project under development<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">MAREP drives grid extension, complemented by off-grid solar, solar home systems and institutional installations. New generation such as the Mpatamanga hydropower and solar projects aims to lift supply, but rural connectivity and clean cooking remain the binding constraints.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.63–66<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-inst-panel=\"imf\" style=\"{{ instPanel.imf }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">IMF Extended Credit Facility<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">Anchoring reform amid a heavy debt burden<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#B4533A;\">91.3%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">public debt as a share of GDP<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#B4533A;\">60%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">external debt service as a share of exports (2023)<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#B0791F;\">32%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">of domestic revenue absorbed by debt service<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">The successful negotiation of the IMF Extended Credit Facility provides a framework for continued reform and limited direct budget support. With debt at unsustainable levels, fiscal consolidation and concessional financing are central to restoring space for development spending.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.126<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-inst-panel=\"climate\" style=\"{{ instPanel.climate }}\"><div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:28px 30px;display:flex;flex-direction:column;gap:16px;animation:rise 0.3s ease both;\"><div><div style=\"font-size:19px;font-weight:700;\">Climate Adaptation &amp; Disaster Risk Management<\u002Fdiv><div style=\"font-size:13px;font-style:italic;color:#9AA7B4;\">Building resilience after repeated shocks<\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:28px;flex-wrap:wrap;\"><div><div style=\"font-size:30px;font-weight:700;color:#B4533A;\">126,511<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">households affected by Cyclone Freddy (2023)<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#2E7D5B;\">CBDRM<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">community-based disaster risk management scaled up<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:30px;font-weight:700;color:#1F6FB2;\">NAPs<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">national adaptation strategies in implementation<\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#5A6B7C;\">Floods, storms and cyclones repeatedly reverse development gains. Malawi is implementing national adaptation strategies and strengthening community-based disaster risk management, with a Post-Disaster Needs Assessment guiding recovery after Cyclone Freddy.<\u002Fp><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.21, 129–130<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-tab-panel=\"financing\" style=\"{{ tabPanel.financing }}\">\n<div data-screen-label=\"Financing\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><h2 style=\"margin:0;font-size:22px;font-weight:700;\">Financing for Development<\u002Fh2><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5A6B7C;\">Facing forex shortages, food insecurity and heavy debt, Malawi adopted a national financing strategy to fund the Malawi 2063 vision: strengthen domestic revenue first, secure concessional and external finance second, and restore debt and fiscal sustainability throughout.<\u002Fp><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;\">\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;gap:14px;\"><div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:30px;height:30px;border-radius:999px;background:#E5F1EB;color:#2E7D5B;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;\">1<\u002Fspan><span style=\"font-size:15px;font-weight:600;\">Domestic instruments<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.5;color:#45525F;\"><div title=\"Digital declaration and collection\"><strong>Msonkho Online<\u002Fstrong> — digitized tax administration broadening the base<\u002Fdiv><div title=\"Reduces reliance on external aid\"><strong>Own-tax funding<\u002Fstrong> — 54% of the budget, up from 19.8% in 2015<\u002Fdiv><div title=\"Improves efficiency and revenue\"><strong>SOE &amp; PFM reform<\u002Fstrong> — reforming state-owned enterprises and public financial management<\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.123–124<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;gap:14px;\"><div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:30px;height:30px;border-radius:999px;background:#F7EEDC;color:#B0791F;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;\">2<\u002Fspan><span style=\"font-size:15px;font-weight:600;\">Concessional &amp; external finance<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.5;color:#45525F;\"><div title=\"Framework for continued reform\"><strong>IMF Extended Credit Facility<\u002Fstrong> — anchors reform and limited budget support<\u002Fdiv><div title=\"A vote of confidence in the trajectory\"><strong>US$744M US grant<\u002Fstrong> — five-year support for health-service delivery<\u002Fdiv><div title=\"Seeking favourable terms\"><strong>FDI &amp; concessional funds<\u002Fstrong> — actively courted to close the financing gap<\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.125–126<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:24px 26px;display:flex;flex-direction:column;gap:14px;\"><div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:30px;height:30px;border-radius:999px;background:#F1F6FA;color:#1F6FB2;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;\">3<\u002Fspan><span style=\"font-size:15px;font-weight:600;\">Debt &amp; fiscal sustainability<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.5;color:#45525F;\"><div title=\"Debt service is the largest expenditure\"><strong>Debt at 91.3% of GDP<\u002Fstrong> — fiscal consolidation to bring debt onto a sustainable path<\u002Fdiv><div title=\"Limits external debt-service growth\"><strong>Concessional-only borrowing<\u002Fstrong> — seeking grants and highly concessional loans<\u002Fdiv><div title=\"Coordinates all financing flows\"><strong>Financing governance<\u002Fstrong> — High-Level Forum, Implementation Group and Technical Secretariat<\u002Fdiv><\u002Fdiv><div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.126–127<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;\">\n<div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;\"><div style=\"font-size:16px;font-weight:600;\">Public finances at a glance, latest year<\u002Fdiv><div style=\"font-size:12.5px;color:#7A8A9A;\">shares expressed against different bases — see labels<\u002Fdiv><\u002Fdiv>\n<div style=\"display:grid;grid-template-co
