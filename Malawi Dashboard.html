lumns:repeat(4,1fr);gap:12px;margin-top:16px;\">\n<div style=\"background:#F1F6FA;border-radius:10px;padding:16px 18px;\" title=\"Down from 16.5% in 2021/22\"><div style=\"font-size:26px;font-weight:700;color:#B0791F;\">15.9%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">Government revenue, % of GDP<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:16px 18px;\" title=\"Up from 19.8% in 2015\"><div style=\"font-size:26px;font-weight:700;color:#2E7D5B;\">54%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">Budget funded by own taxes<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:16px 18px;\" title=\"Unsustainable level\"><div style=\"font-size:26px;font-weight:700;color:#B4533A;\">91.3%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">Public debt, % of GDP<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#F1F6FA;border-radius:10px;padding:16px 18px;\" title=\"Largest single expenditure item\"><div style=\"font-size:26px;font-weight:700;color:#B4533A;\">32%<\u002Fdiv><div style=\"font-size:12px;color:#5A6B7C;\">Revenue spent on debt service<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<p style=\"margin:14px 0 0 0;font-size:13.5px;line-height:1.6;color:#45525F;\">Malawi's financing story is one of rising domestic effort against a heavy debt overhang. Own-tax financing has surged, but debt service now consumes a third of domestic revenue, squeezing the fiscal space available for the SDGs. The strategy is to grow revenue, borrow only on concessional terms, and rebuild sustainability.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:12px;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.113–114, 126<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv><div data-tab-panel=\"debt\" style=\"{{ tabPanel.debt }}\">\n<div data-screen-label=\"Debt and Revenue\" style=\"display:flex;flex-direction:column;gap:20px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><h2 style=\"margin:0;font-size:22px;font-weight:700;\">Debt Sustainability &amp; Domestic Resource Mobilization<\u002Fh2><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5A6B7C;\">Two sides of the same public-finance story: an unsustainable debt burden on one side, and rapidly rising domestic revenue effort on the other.<\u002Fp><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 28px;display:flex;flex-direction:column;gap:14px;\">\n<div style=\"font-size:16px;font-weight:600;\">An unsustainable debt burden<\u002Fdiv>\n<div><div style=\"position:relative;height:24px;background:#EEF1F4;border-radius:999px;overflow:hidden;\"><div style=\"width:91.3%;height:100%;background:#B4533A;border-radius:999px;transform-origin:left;animation:grow 0.8s cubic-bezier(.2,.8,.2,1) both;\"><\u002Fdiv><\u002Fdiv><div style=\"position:relative;height:16px;margin-top:2px;\"><div style=\"position:absolute;left:60%;top:0;border-left:2px dashed #1B2A3A;height:8px;\"><\u002Fdiv><div style=\"position:absolute;left:60%;top:8px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#5A6B7C;transform:translateX(-50%);\">60% benchmark<\u002Fdiv><div style=\"position:absolute;left:91.3%;top:8px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:#B4533A;transform:translateX(-100%);\">91.3%<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\"><div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Benchmark is 10%\"><div style=\"font-size:23px;font-weight:700;color:#B4533A;\">60%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">external debt service, % of exports (2023)<\u002Fdiv><\u002Fdiv><div style=\"background:#F1F6FA;border-radius:10px;padding:14px 16px;\" title=\"Largest single expenditure\"><div style=\"font-size:23px;font-weight:700;color:#B0791F;\">32%<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">of domestic revenue to debt service<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<p style=\"margin:0;font-size:13px;line-height:1.6;color:#45525F;\">Total public debt has reached 91.3% of GDP, driven by fiscal deficits, currency depreciation and shocks such as Cyclone Freddy. External debt service hit 60% of exports in 2023, far above the 10% sustainability threshold, and debt service is now the largest single line in the budget. The IMF Extended Credit Facility anchors the consolidation effort.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Sources: <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 17.4.1<\u002Fa> · <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.114, 126<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 28px;display:flex;flex-direction:column;gap:12px;\">\n<div style=\"font-size:16px;font-weight:600;\">Domestic revenue effort is rising fast<\u002Fdiv>\n<svg viewBox=\"0 0 460 190\" style=\"width:100%;height:auto;display:block;\">\n<line x1=\"40\" y1=\"150\" x2=\"440\" y2=\"150\" stroke=\"#E3E7EC\" stroke-width=\"1\"><\u002Fline><line x1=\"40\" y1=\"95\" x2=\"440\" y2=\"95\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline><line x1=\"40\" y1=\"40\" x2=\"440\" y2=\"40\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline>\n<text x=\"32\" y=\"154\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"9\" fill=\"#9AA7B4\">0%<\u002Ftext><text x=\"32\" y=\"99\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"9\" fill=\"#9AA7B4\">30%<\u002Ftext><text x=\"32\" y=\"44\" text-anchor=\"end\" font-family=\"IBM Plex Mono\" font-size=\"9\" fill=\"#9AA7B4\">60%<\u002Ftext>\n<polyline points=\"70,114 250,86 420,51\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpolyline>\n<circle cx=\"70\" cy=\"114\" r=\"4\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.1s both;\"><title>Budget on own taxes 2015, 19.8%<\u002Ftitle><\u002Fcircle>\n<circle cx=\"250\" cy=\"86\" r=\"4\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.25s both;\"><title>~2020, ~35% (trajectory)<\u002Ftitle><\u002Fcircle>\n<circle cx=\"420\" cy=\"51\" r=\"5\" fill=\"#1F6FB2\" style=\"animation:pop 0.4s ease 0.4s both;\"><title>Budget on own taxes 2024, 54%<\u002Ftitle><\u002Fcircle>\n<text x=\"428\" y=\"55\" font-family=\"IBM Plex Mono\" font-size=\"11\" font-weight=\"600\" fill=\"#1F6FB2\">54%<\u002Ftext>\n<text x=\"70\" y=\"168\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"9.5\" fill=\"#7A8A9A\">2015<\u002Ftext><text x=\"250\" y=\"168\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"9.5\" fill=\"#7A8A9A\">2020<\u002Ftext><text x=\"420\" y=\"168\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"9.5\" fill=\"#7A8A9A\">2024<\u002Ftext>\n<\u002Fsvg>\n<p style=\"margin:0;font-size:13px;line-height:1.6;color:#45525F;\">The share of the budget funded by domestic taxes nearly tripled, from 19.8% in 2015 to 54% in 2024, even as total revenue eased to 15.9% of GDP. Digitized collection via Msonkho Online, tax-incentive reform and stronger local revenue underpin the gain — the foundation for weaning the budget off volatile external support.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Sources: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.113 (Figures 22–23)<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 17.1.1<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div data-tab-panel=\"water\" style=\"{{ tabPanel.water }}\">\n<div data-screen-label=\"Water\" style=\"display:flex;flex-direction:column;gap:18px;animation:rise 0.35s ease both;\">\n<div style=\"display:flex;flex-direction:column;gap:6px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#7A8A9A;\">African Union theme · 2026<\u002Fspan><h2 style=\"margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;\">Year of Water Sustainability<\u002Fh2><\u002Fdiv>\n<div style=\"background:linear-gradient(135deg,#1F6FB2 0%,#16537E 100%);border-radius:18px;padding:40px 44px;color:#FFFFFF;display:grid;grid-template-columns:0.85fr 1.15fr;gap:48px;align-items:center;box-shadow:0 14px 34px rgba(22,83,126,0.24);\">\n<div style=\"display:flex;flex-direction:column;gap:16px;\">\n<span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);\">Improved drinking water source<\u002Fspan>\n<div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\"><span style=\"font-size:68px;font-weight:700;letter-spacing:-0.02em;line-height:0.9;\">89%<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#F4CE8A;\">▲ from 87% in 2015<\u002Fspan><\u002Fdiv>\n<p style=\"margin:0;font-size:14px;line-height:1.6;color:rgba(255,255,255,0.86);\">Access to an improved water source is one of Malawi's strongest indicators. But the tighter measure of at least basic water services sits lower at 73%, and sanitation lags far behind — the real frontier for the Year of Water Sustainability.<\u002Fp>\n<\u002Fdiv>\n<div style=\"display:flex;flex-direction:column;gap:16px;\">\n<div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:12px;\"><span style=\"font-size:14px;font-weight:600;\">Water &amp; sanitation ladder, latest<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:rgba(255,255,255,0.7);\">the sanitation gap<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex-direction:column;gap:14px;\">\n<div style=\"display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:12px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);\">Improved water<\u002Fspan><div style=\"height:20px;background:rgba(255,255,255,0.20);border-radius:999px;\"><div style=\"width:89%;height:100%;background:#FFFFFF;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;\">89%<\u002Fspan><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:12px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);\">Basic water<\u002Fspan><div style=\"height:20px;background:rgba(255,255,255,0.20);border-radius:999px;\"><div style=\"width:73%;height:100%;background:#CFE0EF;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;\">73%<\u002Fspan><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:12px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);\">Basic sanitation<\u002Fspan><div style=\"height:20px;background:rgba(255,255,255,0.20);border-radius:999px;\"><div style=\"width:40%;height:100%;background:#F4CE8A;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) 0.2s both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:#F4CE8A;\">40%<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.55);\">Sources: VNR 2026, p.57–59 · WHO/UNICEF JMP / MDHS 2024 · UN SDG Database, indicator 6.1.1<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:stretch;\">\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;display:flex;flex-direction:column;gap:14px;\">\n<div style=\"font-size:16px;font-weight:600;\">Water as a driver of health and equality<\u002Fdiv>\n<p style=\"margin:0;font-size:13px;line-height:1.55;color:#5A6B7C;\">Community surveys for the 2026 review found that clean-water supply projects produced benefits well beyond health. Alongside sharp declines in <strong>cholera and diarrhoea<\u002Fstrong>, communities reported <strong>reduced gender-based abuse and marital disputes<\u002Fstrong>, as women no longer spend hours each day collecting water, and easier access to water for livestock and crops.<\u002Fp>\n<div style=\"background:#F6F9FB;border-radius:12px;padding:16px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;\">\n<div><div style=\"font-size:22px;font-weight:700;color:#2E7D5B;\">274<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">households served by nine new reticulated water points<\u002Fdiv><\u002Fdiv>\n<div><div style=\"font-size:22px;font-weight:700;color:#1F6FB2;\">↓<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">observed cholera &amp; diarrhoea cases<\u002Fdiv><\u002Fdiv>\n<div><div style=\"font-size:22px;font-weight:700;color:#2E7D5B;\">+time<\u002Fdiv><div style=\"font-size:11.5px;color:#5A6B7C;\">women reclaim hours once spent fetching water<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.57–60 (community perspectives)<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"background:#FFFFFF;border:1px solid #E3E7EC;border-radius:14px;padding:26px 30px;display:flex;flex-direction:column;gap:12px;\">\n<div style=\"font-size:16px;font-weight:600;\">The sanitation frontier<\u002Fdiv>\n<div style=\"display:flex;flex-direction:column;gap:10px;padding:4px 0;\">\n<div style=\"display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:10px;\"><span style=\"font-size:12.5px;color:#5A6B7C;\">Basic sanitation<\u002Fspan><div style=\"height:14px;background:#EEF1F4;border-radius:999px;\"><div style=\"width:40%;height:100%;background:#B0791F;border-radius:999px;transform-origin:left;animation:grow 0.7s cubic-bezier(.2,.8,.2,1) both;\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B0791F;font-weight:600;\">40%<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<p style=\"margin:0;font-size:13px;line-height:1.55;color:#5A6B7C;\">Only 40% of Malawians have at least basic sanitation, and open defecation persists in some areas, with facilities that do not consistently meet the needs of women, girls and people with disabilities. Safely managed sanitation is the review's clearest WASH priority.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#9AA7B4;margin-top:auto;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.58–59<\u002Fa> · <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">UN SDG Database, indicator 6.2.2<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div style=\"background:#FBF1EE;border:1px solid #EAD3CB;border-left:5px solid #B4533A;border-radius:14px;padding:24px 30px;display:flex;flex-direction:column;gap:8px;\">\n<div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:8px;height:8px;border-radius:999px;background:#B4533A;\"><\u002Fspan><span style=\"font-size:16px;font-weight:600;color:#8A3B27;\">Water security as human security<\u002Fspan><\u002Fdiv>\n<p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6B4A40;\">Malawi's water gains are fragile in the face of climate shocks. <strong>Cyclone Freddy<\u002Fstrong> affected 126,511 households, destroying water points, roads and health facilities and spreading waterborne disease. The review treats climate-resilient water and sanitation as inseparable from disaster preparedness and social stability.<\u002Fp>\n<div data-src=\"\" style=\"{{ srcStyle }}\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#B08A7E;\">Source: <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">VNR 2026, p.21, 129–130<\u002Fa><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>    <\u002Fdiv><\u002Fmain>\n  <footer style=\"background:#FFFFFF;border-top:1px solid #E3E7EC;padding:18px 48px;font-size:11.5px;line-height:1.6;color:#9AA7B4;\">\n    <div style=\"max-width:1280px;margin:0 auto;\">Sources: Government of Malawi, <a href=\"https://hlpf.un.org/countries/malawi\" target=\"_blank\" rel=\"noopener\">Voluntary National Review 2026<\u002Fa>; VNR 2022; VNR 2020; <a href=\"https://unstats.un.org/sdgs/dataportal/countryprofiles/mwi\" target=\"_blank\" rel=\"noopener\">United Nations SDG Database<\u002Fa>. Page citations refer to the VNR 2026 unless otherwise noted. · Prototype for internal review, structure replicated identically across all 19 country dashboards.<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;defaultTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;goals&quot;,&quot;joint&quot;,&quot;policy&quot;,&quot;financing&quot;,&quot;debt&quot;,&quot;water&quot;],&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;showSources&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { tab: (props && props.defaultTab) || 'overview', metric: 'elec', goal: 's6', inst: 'mw2063' };\n  }\n  tabStyle(active){ return { background:'none', border:'none', cursor:'pointer', padding:'12px 16px', fontSize:'14px', fontWeight: active?'700':'500', color: active?'#1F6FB2':'#5A6B7C', borderBottom: active?'3px solid #1F6FB2':'3px solid transparent', transition:'color 0.15s ease' }; }\n  tileStyle(active){ return { display:'flex', flexDirection:'column', alignItems:'flex-start', gap:'4px', textAlign:'left', padding: active?'15px 17px':'16px 18px', borderRadius:'12px', cursor:'pointer', transition:'all 0.15s ease', background:'#FFFFFF', border: active?'2px solid #1F6FB2':'1px solid #E3E7EC', boxShadow: active?'0 4px 14px rgba(31,111,178,0.14)':'none' }; }\n  goalStyle(active){ return { display:'flex', alignItems:'center', gap:'10px', textAlign:'left', padding:'14px 16px', borderRadius:'12px', cursor:'pointer', background:'#FFFFFF', border: active?'2px solid #1F6FB2':'1px solid #E3E7EC', boxShadow: active?'0 4px 14px rgba(31,111,178,0.14)':'none', transition:'all 0.15s ease' }; }\n  instStyle(active){ return { display:'flex', flexDirection:'column', alignItems:'flex-start', gap:'2px', textAlign:'left', padding:'13px 16px', borderRadius:'10px', cursor:'pointer', background: active?'#F1F6FA':'#FFFFFF', border: active?'2px solid #1F6FB2':'1px solid #E3E7EC', color: active?'#1F6FB2':'#1B2A3A', fontSize:'13.5px', transition:'all 0.15s ease' }; }\n  build(keys, current, styleFn, stateKey){\n    const btn={}, on={}, panel={};\n    keys.forEach((k)=>{ btn[k]=styleFn.call(this, k===current); panel[k]={ display: k===current ? 'block' : 'none' }; on[k]=()=>{ const p={}; p[stateKey]=k; this.setState(p); }; });\n    return { btn, on, panel };\n  }\n  renderVals(){\n    const s=this.state;\n    const tabs=this.build(['overview','goals','joint','policy','financing','debt','water'], s.tab, this.tabStyle, 'tab');\n    const metrics=this.build(['elec','water','rev','debt','taxes'], s.metric, this.tileStyle, 'metric');\n    const goals=this.build(['s6','s7','s9','s11','s17'], s.goal, this.goalStyle, 'goal');\n    const insts=this.build(['mw2063','finstrat','drm','marep','imf','climate'], s.inst, this.instStyle, 'inst');\n    const show = this.props.showSources !== false;\n    return { tabBtn: tabs.btn, onTab: tabs.on, tabPanel: tabs.panel, metricBtn: metrics.btn, onMetric: metrics.on, metricPanel: metrics.panel, goalBtn: goals.btn, onGoal: goals.on, goalPanel: goals.panel, instBtn: insts.btn, onInst: insts.on, instPanel: insts.panel, srcStyle: { display: show ? 'block' : 'none' } };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
